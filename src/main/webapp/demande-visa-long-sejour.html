<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demande de Visa Transformable en Long Sejour</title>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .section {
            padding: 30px;
            border-bottom: 1px solid #e0e0e0;
        }

        .section:last-of-type {
            border-bottom: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="date"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .motif-container {
            display: flex;
            gap: 30px;
            margin-top: 10px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-group input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .radio-group label {
            margin: 0;
            font-weight: 500;
            cursor: pointer;
        }

        .checklist-section {
            margin-top: 20px;
        }

        .subsection {
            margin-bottom: 25px;
        }

        .subsection-title {
            font-size: 14px;
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .checkbox-group:last-child {
            border-bottom: none;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }

        .category-selector {
            background-color: #f0f4f8;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .category-selector h3 {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .category-options {
            display: flex;
            gap: 20px;
        }

        .category-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .category-option label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .hidden-content {
            display: none;
        }

        .hidden-content.active {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #cfcfcf;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .motif-container {
                flex-direction: column;
                gap: 15px;
            }

            .category-options {
                flex-direction: column;
                gap: 10px;
            }

            .button-group {
                flex-direction: column;
            }

            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Demande de Visa Transformable en Long Sejour</h1>
            <p>Republique de Madagascar</p>
        </div>

        <form id="visaForm">
            <div class="section">
                <div class="section-title">1. Informations Personnelles</div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">NOM :</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>
                    <div class="form-group">
                        <label for="prenoms">PRENOMS :</label>
                        <input type="text" id="prenoms" name="prenoms" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="nomJeuneFille">NOM DE JEUNE FILLE :</label>
                        <input type="text" id="nomJeuneFille" name="nomJeuneFille">
                    </div>
                    <div class="form-group">
                        <label for="dateNaissance">NE(E) LE :</label>
                        <input type="date" id="dateNaissance" name="dateNaissance" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="situationFamille">SITUATION DE FAMILLE :</label>
                        <select id="situationFamille" name="situationFamille" required>
                            <option value="">-- Selectionner --</option>
                            <option value="celibataire">Celibataire</option>
                            <option value="marie">Marie(e)</option>
                            <option value="divorce">Divorce(e)</option>
                            <option value="veuf">Veuf/Veuve</option>
                            <option value="pacs">Pacs(e)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="nationalite">NATIONALITE :</label>
                        <input type="text" id="nationalite" name="nationalite" required>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="domicile">DOMICILE HABITUEL :</label>
                        <input type="text" id="domicile" name="domicile" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="profession">PROFESSION OU QUALITE :</label>
                        <input type="text" id="profession" name="profession" required>
                    </div>
                    <div class="form-group">
                        <label for="employeur">EMPLOYEUR :</label>
                        <input type="text" id="employeur" name="employeur">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="adresse">ADRESSE :</label>
                        <input type="text" id="adresse" name="adresse" required>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">2. Donnees du Passeport</div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="passeport">PASSEPORT N :</label>
                        <input type="text" id="passeport" name="passeport" required>
                    </div>
                    <div class="form-group">
                        <label for="delivrepar">DELIVRE PAR :</label>
                        <input type="text" id="delivrepar" name="delivrepar" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateDelivrance">DATE DE DELIVRANCE :</label>
                        <input type="date" id="dateDelivrance" name="dateDelivrance" required>
                    </div>
                    <div class="form-group">
                        <label for="dateExpiration">DATE D'EXPIRATION :</label>
                        <input type="date" id="dateExpiration" name="dateExpiration">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">3. Mouvements a Madagascar</div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateEntree">DATE D'ENTREE A MADAGASCAR :</label>
                        <input type="date" id="dateEntree" name="dateEntree" required>
                    </div>
                    <div class="form-group">
                        <label for="lieuEntree">LIEU D'ENTREE :</label>
                        <input type="text" id="lieuEntree" name="lieuEntree">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateSortie">DATE DE SORTIE :</label>
                        <input type="date" id="dateSortie" name="dateSortie">
                    </div>
                    <div class="form-group">
                        <label for="lieuSortie">LIEU DE SORTIE :</label>
                        <input type="text" id="lieuSortie" name="lieuSortie">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">4. Motif du Voyage</div>

                <div class="motif-container">
                    <div class="radio-group">
                        <input type="radio" id="travailleur" name="motif" value="travailleur" required>
                        <label for="travailleur">TRAVAILLEUR</label>
                    </div>
                    <div class="radio-group">
                        <input type="radio" id="investisseur" name="motif" value="investisseur">
                        <label for="investisseur">INVESTISSEUR</label>
                    </div>
                    <div class="radio-group">
                        <input type="radio" id="regroupement" name="motif" value="regroupement">
                        <label for="regroupement">REGROUPEMENT FAMILIAL</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">5. Documents a Fournir</div>

                <div class="category-selector">
                    <h3>Selectionnez votre categorie :</h3>
                    <div class="category-options">
                        <div class="category-option">
                            <input type="radio" id="catTravailleur" name="categorie" value="travailleur" onchange="updateDocuments()">
                            <label for="catTravailleur">Travailleur</label>
                        </div>
                        <div class="category-option">
                            <input type="radio" id="catInvestisseur" name="categorie" value="investisseur" onchange="updateDocuments()">
                            <label for="catInvestisseur">Investisseur</label>
                        </div>
                        <div class="category-option">
                            <input type="radio" id="catRegroupement" name="categorie" value="regroupement" onchange="updateDocuments()">
                            <label for="catRegroupement">Regroupement Familial</label>
                        </div>
                    </div>
                </div>

                <div class="checklist-section">
                    <div class="subsection">
                        <div class="subsection-title">Pieces Communes</div>
                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece1" name="pieces_communes" value="photos">
                            <label for="piece1">02 photos d'identite</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece2" name="pieces_communes" value="notice">
                            <label for="piece2">Notice de renseignement</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece3" name="pieces_communes" value="demande">
                            <label for="piece3">Demande adressee a Mr le Ministere de l'Interieur et de la Decentralisation avec adresse e-mail et numero telephone portable</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece4" name="pieces_communes" value="visa">
                            <label for="piece4">Photocopie certifiee du visa en cours de validite</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece5" name="pieces_communes" value="passeport">
                            <label for="piece5">Photocopie certifiee de la premiere page du passeport</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece6" name="pieces_communes" value="carteResident">
                            <label for="piece6">Photocopie certifiee de la carte resident en cours de validite</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece7" name="pieces_communes" value="residence">
                            <label for="piece7">Certificat de residence a Madagascar</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="piece8" name="pieces_communes" value="casier">
                            <label for="piece8">Extrait de casier judiciaire moins de 3 mois</label>
                        </div>
                    </div>

                    <div class="subsection" id="completaires">
                        <div class="subsection-title">Pieces Complementaires</div>

                        <div id="pieces-travailleur" class="hidden-content">
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp1" name="pieces_complement" value="autorisation">
                                <label for="comp1">Autorisation emploi delivree a Madagascar par le Ministere de la Fonction publique</label>
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp2" name="pieces_complement" value="attestation">
                                <label for="comp2">Attestation d'emploi delivre par l'employeur (Original)</label>
                            </div>
                        </div>

                        <div id="pieces-investisseur" class="hidden-content">
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp3" name="pieces_complement" value="statut">
                                <label for="comp3">Statut de la Societe</label>
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp4" name="pieces_complement" value="registre">
                                <label for="comp4">Extrait d'inscription au registre de commerce</label>
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp5" name="pieces_complement" value="fiscale">
                                <label for="comp5">Carte fiscale</label>
                            </div>
                        </div>

                        <div id="pieces-regroupement" class="hidden-content">
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp6" name="pieces_complement" value="naissance">
                                <label for="comp6">Acte de naissance livre moins de 6 mois (enfant) ou acte de mariage (livret de famille)</label>
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp7" name="pieces_complement" value="ressources">
                                <label for="comp7">Justificatif de ressources pour les Hommes en regroupement familial</label>
                            </div>
                            <div class="checkbox-group">
                                <input type="checkbox" id="comp8" name="pieces_complement" value="autorisationRF">
                                <label for="comp8">Autorisation emploi pour le Regroupement familial des travailleurs</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Soumettre la Demande</button>
                    <button type="reset" class="btn btn-secondary">Reinitialiser</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function updateDocuments() {
            const categorie = document.querySelector('input[name="categorie"]:checked')?.value;
            
            document.getElementById('pieces-travailleur').classList.remove('active');
            document.getElementById('pieces-investisseur').classList.remove('active');
            document.getElementById('pieces-regroupement').classList.remove('active');
            
            if (categorie === 'travailleur') {
                document.getElementById('pieces-travailleur').classList.add('active');
            } else if (categorie === 'investisseur') {
                document.getElementById('pieces-investisseur').classList.add('active');
            } else if (categorie === 'regroupement') {
                document.getElementById('pieces-regroupement').classList.add('active');
            }
        }

        document.querySelectorAll('input[name="motif"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const value = this.value;
                if (value === 'travailleur') {
                    document.getElementById('catTravailleur').checked = true;
                } else if (value === 'investisseur') {
                    document.getElementById('catInvestisseur').checked = true;
                } else if (value === 'regroupement') {
                    document.getElementById('catRegroupement').checked = true;
                }
                updateDocuments();
            });
        });

        // Configuration de l'API Back Office
        // (les détails de configuration sont dans config.js)

        document.getElementById('visaForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Validation de la catégorie de documents
            const categorie = document.querySelector('input[name="categorie"]:checked')?.value;
            if (!categorie) {
                alert('Veuillez sélectionner une catégorie de documents');
                return;
            }

            // Fonction utilitaire pour convertir les chaînes vides en null
            const emptyToNull = (value) => value === '' ? null : value;

            // Mapper les données du formulaire au format DemandeDTO du back office
            const visaRequest = {
                typeDemande: 'NOUVEAU_TITRE',
                categorieVisa: categorie.toUpperCase(),

                // Informations personnelles (structure plate)
                lastName: emptyToNull(document.getElementById('nom').value),
                firstNames: emptyToNull(document.getElementById('prenoms').value),
                maidenName: emptyToNull(document.getElementById('nomJeuneFille').value),
                birthDate: emptyToNull(document.getElementById('dateNaissance').value),
                maritalStatus: emptyToNull(document.getElementById('situationFamille').value),
                nationality: emptyToNull(document.getElementById('nationalite').value),
                homeAddress: emptyToNull(document.getElementById('domicile').value),
                occupation: emptyToNull(document.getElementById('profession').value),
                employerName: emptyToNull(document.getElementById('employeur').value),
                employerAddress: emptyToNull(document.getElementById('adresse').value),

                // Visa transformable (précédent)
                numeroVisaPrcd: emptyToNull(document.getElementById('passeport').value),
                dateDelivranceVisaPrcd: emptyToNull(document.getElementById('dateDelivrance').value),
                dateExpirationVisaPrcd: emptyToNull(document.getElementById('dateExpiration').value),

                // Pièces communes
                aFourniPhotos: document.getElementById('piece1').checked,
                aFourniNoticeRenseignement: document.getElementById('piece2').checked,
                aFourniDemandeMinistre: document.getElementById('piece3').checked,
                aFourniCopieVisa: document.getElementById('piece4').checked,
                aFourniCopiePasseport: document.getElementById('piece5').checked,
                aFourniCopieCarteResident: document.getElementById('piece6').checked,
                aFourniCertificatResidence: document.getElementById('piece7').checked,
                aFourniExtraitCasierJudiciaire: document.getElementById('piece8').checked,

                // Pièces complémentaires - Travailleur
                aFourniAutorisationEmploi: document.getElementById('comp1')?.checked || false,
                aFourniAttestationEmploi: document.getElementById('comp2')?.checked || false,

                // Pièces complémentaires - Investisseur
                aFourniStatutSociete: document.getElementById('comp3')?.checked || false,
                aFourniExtraitRC: document.getElementById('comp4')?.checked || false,
                aFourniCarteFiscale: document.getElementById('comp5')?.checked || false
            };
            
            console.log('Envoi des donnees vers le back office:', JSON.stringify(visaRequest, null, 2));
            
            const button = this.querySelector('button[type="submit"]');
            const originalText = button.textContent;
            button.textContent = 'Envoi en cours...';
            button.disabled = true;
            
            try {
                const apiUrl = API_CONFIG.BASE_URL + API_CONFIG.ENDPOINT;
                console.log('URL API:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(visaRequest)
                });
                
                const result = await response.json();
                console.log('Reponse du serveur:', result);
                
                if (response.ok) {
                    alert('Demande envoyee avec succes!\n\nID Demande: ' + (result.id || result.numerodemande || 'N/A'));
                    this.reset();
                } else {
                    alert('Erreur: ' + (result.message || result.error || 'Erreur inconnue'));
                }
                
            } catch (error) {
                console.error('Erreur lors de l\'envoi:', error);
                alert('Erreur lors de l\'envoi à l\'API:\n' + error.message + '\n\nAssurez-vous que le back office est en cours d\'exécution sur ' + API_CONFIG.BASE_URL);
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        });

        document.querySelectorAll('.checkbox-group input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                if (this.checked) {
                    this.parentElement.style.backgroundColor = '#f0f4f8';
                } else {
                    this.parentElement.style.backgroundColor = 'transparent';
                }
            });
        });
    </script>
</body>
</html>
