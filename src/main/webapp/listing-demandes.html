<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mes demandes — Visa Transformable</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">Visa <span>Transformable</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Tableau de bord</a>
    <a class="nav-link" href="demande-visa-long-sejour.html">Nouvelle demande</a>
    <a class="nav-link active" href="listing-demandes.html">Mes demandes</a>
  </div>
</nav>

<main class="page">
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
    <div>
      <h1 class="page-title">Mes <em>demandes</em></h1>
      <p class="page-sub">Consultez et gérez l'ensemble de vos dossiers de transformation</p>
    </div>
    <a class="btn btn-primary" href="demande-visa-long-sejour.html" style="white-space:nowrap;margin-top:0.5rem">+ Nouvelle demande</a>
  </div>

  <!-- Filters -->
  <div class="card" style="margin-bottom:1rem">
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="field" style="flex:1;min-width:200px">
        <label>Rechercher</label>
        <input type="text" id="search-input" placeholder="Nom, prénom, type de visa…" oninput="filterDemandes()"/>
      </div>
      <div class="field" style="width:160px">
        <label>Type</label>
        <select id="filter-type" onchange="filterDemandes()">
          <option value="">Tous</option>
          <option value="TRAVAIL">Travail</option>
          <option value="ENTREPRENEUR">Entrepreneur</option>
        </select>
      </div>
      <div class="field" style="width:160px">
        <label>Statut</label>
        <select id="filter-status" onchange="filterDemandes()">
          <option value="">Tous</option>
          <option value="COMPLET">Complet</option>
          <option value="INCOMPLET">Incomplet</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card" style="padding:0">
    <div id="table-container">
      <div class="loading-state" style="padding:2rem"><div class="spinner"></div> Chargement…</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script>
let allDemandes = [];

async function loadDemandes() {
  try {
    const raw = await apiFetch(API.demandes);
    allDemandes = normalizeDemandesForUi(raw);
    renderTable(allDemandes);
  } catch (e) {
    document.getElementById('table-container').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>
       <div class="empty-title">Erreur de chargement</div>
       <div class="empty-sub">${e.message}</div></div>`;
  }
}

function filterDemandes() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  const status = document.getElementById('filter-status').value;

  const filtered = allDemandes.filter(d => {
    const { pct } = countPieces(d);
    const s = pct === 100 ? 'COMPLET' : 'INCOMPLET';
    const matchSearch = !q ||
      (d.lastName || '').toLowerCase().includes(q) ||
      (d.firstNames || '').toLowerCase().includes(q) ||
      (d.typeVisa || '').toLowerCase().includes(q);
    const matchType = !type || (d.typeVisa || '') === type;
    const matchStatus = !status || s === status;
    return matchSearch && matchType && matchStatus;
  });

  renderTable(filtered);
}

function renderTable(list) {
  const container = document.getElementById('table-container');

  if (!list.length) {
    container.innerHTML = `
      <div class="empty" style="padding:3rem">
        <div class="empty-icon">📂</div>
        <div class="empty-title">Aucune demande trouvée</div>
        <div class="empty-sub">Modifiez vos filtres ou créez une nouvelle demande</div>
      </div>`;
    return;
  }

  container.innerHTML = `
    <div class="table-wrap" style="border:none;border-radius:0">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Demandeur</th>
            <th>Type visa</th>
            <th>Type demande</th>
            <th>Avancement</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(d => {
            const { done, total, pct } = countPieces(d);
            const s = statusLabel(pct === 100 ? 'COMPLET' : 'INCOMPLET');
            const id = d.id;
            return `
            <tr>
              <td class="text-muted text-sm">#${id}</td>
              <td>
                <div style="font-weight:500">${d.lastName || '—'} ${d.firstNames || ''}</div>
                <div class="text-sm text-muted">${d.nationality || ''}</div>
              </td>
              <td>
                <span class="badge badge-neutral">${d.typeVisa || '—'}</span>
              </td>
              <td class="text-sm">
                <span class="badge badge-info">${d.typeDemande || '—'}</span>
              </td>
              <td style="min-width:140px">
                <div class="progress-bar" style="height:4px;margin-bottom:3px">
                  <div class="progress-fill" style="width:${pct}%"></div>
                </div>
                <div class="text-sm text-muted">${done}/${total} pièces (${pct}%)</div>
              </td>
              <td><span class="badge ${s.cls}">${s.label}</span></td>
              <td>
                <div style="display:flex;gap:6px">
                  <a class="btn btn-secondary btn-sm" href="gestion-demandes.html?id=${id}">Modifier</a>
                  <button class="btn btn-danger btn-sm" onclick="deleteDemande(${id})">✕</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div style="padding:0.75rem 1rem;border-top:1px solid var(--c-border);font-size:13px;color:var(--c-muted)">
      ${list.length} demande${list.length > 1 ? 's' : ''} affichée${list.length > 1 ? 's' : ''}
    </div>`;
}

async function deleteDemande(id) {
  if (!confirm('Supprimer cette demande ? Cette action est irréversible.')) return;
  try {
    await apiFetch(API.demandeById(id), { method: 'DELETE' });
    showToast('Demande supprimée');
    await loadDemandes();
  } catch (e) {
    showToast('Erreur : ' + e.message, 'danger');
  }
}

loadDemandes();
</script>
</body>
</html>
