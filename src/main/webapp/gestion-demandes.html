<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Gestion du dossier — Visa Transformable</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">Visa <span>Transformable</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Tableau de bord</a>
    <a class="nav-link" href="demande-visa-long-sejour.html">Nouvelle demande</a>
    <a class="nav-link" href="listing-demandes.html">Mes demandes</a>
  </div>
</nav>

<main class="page">
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
    <div>
      <a href="listing-demandes.html" class="text-sm text-muted" style="display:inline-flex;align-items:center;gap:4px;margin-bottom:8px">
        ← Retour à la liste
      </a>
      <h1 class="page-title" id="page-title">Dossier <em>#—</em></h1>
      <p class="page-sub" id="page-sub">Chargement…</p>
    </div>
    <div id="status-badge-wrap" style="margin-top:0.5rem"></div>
  </div>

  <!-- Loading -->
  <div id="loading-state">
    <div class="loading-state"><div class="spinner"></div> Chargement du dossier…</div>
  </div>

  <!-- Content (hidden until loaded) -->
  <div id="content" style="display:none">

    <!-- Avancement des pièces -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Avancement du dossier</span>
        <span class="badge badge-neutral" id="pieces-count">0 / 13</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="progress-meta">
          <span id="progress-label">0 pièce fournie</span>
          <span id="progress-pct">0%</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="pieces-grid" id="pieces-grid"></div>
      <div class="btn-row" style="margin-top:1rem">
        <button class="btn btn-primary" onclick="savePieces()">Enregistrer les pièces</button>
      </div>
    </div>

    <!-- Informations du demandeur -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Informations du demandeur</span>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Nom de famille *</label>
          <input type="text" id="e-lastName"/>
        </div>
        <div class="field">
          <label>Prénom(s) *</label>
          <input type="text" id="e-firstNames"/>
        </div>
        <div class="field">
          <label>Nom de jeune fille</label>
          <input type="text" id="e-maidenName"/>
        </div>
        <div class="field">
          <label>Date de naissance</label>
          <input type="date" id="e-birthDate"/>
        </div>
        <div class="field">
          <label>Lieu de naissance</label>
          <input type="text" id="e-birthPlace"/>
        </div>
        <div class="field">
          <label>Situation familiale</label>
          <select id="e-maritalStatus">
            <option value="">— Sélectionner —</option>
          </select>
        </div>
        <div class="field">
          <label>Nationalité</label>
          <input type="text" id="e-nationality"/>
        </div>
        <div class="field form-full">
          <label>Adresse de domicile</label>
          <input type="text" id="e-homeAddress"/>
        </div>
        <div class="field">
          <label>Profession / Occupation</label>
          <input type="text" id="e-occupation"/>
        </div>
        <div class="field">
          <label>Employeur / Société</label>
          <input type="text" id="e-employerName"/>
        </div>
        <div class="field form-full">
          <label>Adresse employeur</label>
          <input type="text" id="e-employerAddress"/>
        </div>
      </div>
    </div>

    <!-- Visa précédent -->
    <div class="card">
      <div class="card-header"><span class="card-title">Visa transformable précédent</span></div>
      <div class="form-grid cols-3">
        <div class="field">
          <label>Numéro du visa précédent</label>
          <input type="text" id="e-numeroVisaPrcd"/>
        </div>
        <div class="field">
          <label>Date de délivrance</label>
          <input type="date" id="e-dateDelivranceVisaPrcd"/>
        </div>
        <div class="field">
          <label>Date d'expiration</label>
          <input type="date" id="e-dateExpirationVisaPrcd"/>
        </div>
      </div>
    </div>

    <!-- Type de visa -->
    <div class="card">
      <div class="card-header"><span class="card-title">Type de visa</span></div>
      <div class="form-grid">
        <div class="field">
          <label>Type de demande</label>
          <select id="e-typeDemande">
            <option value="">— Sélectionner —</option>
          </select>
        </div>
        <div class="field">
          <label>Type de visa (non modifiable)</label>
          <input type="text" id="e-typeVisa" readonly style="background-color: #f5f5f5; cursor: not-allowed;"/>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <a class="btn btn-secondary" href="listing-demandes.html">Annuler</a>
      <button class="btn btn-primary" id="btn-save" onclick="saveDemande()">
        <span id="save-text">Enregistrer les modifications</span>
      </button>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script>
let currentData = {};
let demandeId = null;
let piecesList = [];

// Données de référence
let allSituations = [];
let allTypeDemandes = [];
let allTypeVisas = [];

// Labels personnalisés pour l'affichage
const visaDisplayLabels = {
  'TRAVAIL': 'Travailleur',
  'ENTREPRENEUR': 'Investisseur',
  'COURT SEJOUR': 'Court séjour',
  'LONG SEJOUR': 'Long séjour',
  'TRANSFORMABLE': 'Transformable'
};

const demandeDisplayLabels = {
  'NOUVEAU_TITRE': 'Nouveau titre',
  'RENOUVELLEMENT': 'Renouvellement',
  'DUPLICATA': 'Duplicata',
  'TRANSFERT_VISA': 'Transfert de visa',
  'RECUPERATION': 'Récupération',
  'NOUVEAU_TITRE_TRAVAILLEUR': 'Nouveau titre - Travailleur',
  'NOUVEAU_TITRE_INVESTISSEUR': 'Nouveau titre - Investisseur',
  'NOUVEAU_VISA_TRANSFORMABLE': 'Nouveau visa transformable',
  'Première demande': 'Première demande'
};

const DTO_FIELDS = [
  'typeDemande',
  'typeVisa',
  'idDemandeur',
  'lastName',
  'firstNames',
  'maidenName',
  'birthDate',
  'birthPlace',
  'maritalStatus',
  'nationality',
  'homeAddress',
  'occupation',
  'employerName',
  'employerAddress',
  'numeroVisaPrcd',
  'dateDelivranceVisaPrcd',
  'dateExpirationVisaPrcd'
];

function getIdFromUrl() {
  return new URLSearchParams(window.location.search).get('id');
}

function setVal(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.value = val || '';
}

function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() || null : null;
}

async function loadReferenceData() {
  try {
    allSituations = await apiFetch(API.situationsFamiliales) || [];
    allTypeDemandes = await apiFetch(API.typeDemandes) || [];
    allTypeVisas = await apiFetch(API.typeVisas) || [];
  } catch (e) {
    console.error('Erreur chargement données de référence:', e);
  }
  populateSelects();
}

function populateSelects() {
  // Situations familiales
  const sitSelect = document.getElementById('e-maritalStatus');
  if (sitSelect) {
    sitSelect.innerHTML = '<option value="">— Sélectionner —</option>' +
      (allSituations || []).map(s => `<option value="${s.libelle}">${s.libelle}</option>`).join('');
  }

  // Types de demande (avec labels personnalisés)
  const typeDemandeSelect = document.getElementById('e-typeDemande');
  if (typeDemandeSelect) {
    typeDemandeSelect.innerHTML = '<option value="">— Sélectionner —</option>' +
      (allTypeDemandes || []).map(t => {
        const nom = t.nom || '';
        const display = demandeDisplayLabels[nom] || nom;
        return `<option value="${nom}">${display}</option>`;
      }).join('');
  }

  // Type de visa en READ-ONLY - ne pas modifier
}

function normalizeDemande(d) {
  const demandeur = d.demandeur || {};
  const nationalite = demandeur.nationalite || {};
  const situation = demandeur.situationFamille || {};
  const typeDemande = d.typeDemande || {};

  const data = {
    idDemandeur: demandeur.id || null,
    lastName: d.lastName || demandeur.nom || null,
    firstNames: d.firstNames || demandeur.prenom || null,
    maidenName: d.maidenName || null,
    birthDate: d.birthDate || demandeur.dateNaissance || null,
    birthPlace: d.birthPlace || demandeur.lieuNaissance || null,
    maritalStatus: d.maritalStatus || situation.libelle || null,
    nationality: d.nationality || nationalite.nom || null,
    homeAddress: d.homeAddress || null,
    occupation: d.occupation || null,
    employerName: d.employerName || null,
    employerAddress: d.employerAddress || null,
    numeroVisaPrcd: d.numeroVisaPrcd || null,
    dateDelivranceVisaPrcd: d.dateDelivranceVisaPrcd || null,
    dateExpirationVisaPrcd: d.dateExpirationVisaPrcd || null,
    typeDemande: (typeDemande.nom || d.typeDemande) || null,
    typeVisa: d.typeVisa || null,
  };

  return data;
}

function buildDemandePayload(overrides = {}) {
  const payload = {};
  DTO_FIELDS.forEach(key => {
    if (currentData[key] !== undefined) {
      payload[key] = currentData[key];
    }
  });

  Object.keys(overrides).forEach(key => {
    payload[key] = overrides[key];
  });

  return payload;
}

async function loadPieces() {
  try {
    const raw = await apiFetch(API.demandePieces(demandeId));
    piecesList = (raw || []).map(p => ({
      categoriePieceId: p.categoriePieceId || (p.categoriePiece ? p.categoriePiece.id : null),
      libelle: p.libelle || (p.categoriePiece ? p.categoriePiece.libelle : null),
      isProvided: p.isProvided === true || p.is_provided === true,
    }));
  } catch (e) {
    piecesList = [];
  }
  buildPiecesGrid();
}

function populateForm(d) {
  setVal('e-lastName',               d.lastName);
  setVal('e-firstNames',             d.firstNames);
  setVal('e-maidenName',             d.maidenName);
  setVal('e-birthDate',              d.birthDate);
  setVal('e-birthPlace',             d.birthPlace);
  setVal('e-maritalStatus',          d.maritalStatus);
  setVal('e-nationality',            d.nationality);
  setVal('e-homeAddress',            d.homeAddress);
  setVal('e-occupation',             d.occupation);
  setVal('e-employerName',           d.employerName);
  setVal('e-employerAddress',        d.employerAddress);
  setVal('e-numeroVisaPrcd',         d.numeroVisaPrcd);
  setVal('e-dateDelivranceVisaPrcd', d.dateDelivranceVisaPrcd);
  setVal('e-dateExpirationVisaPrcd', d.dateExpirationVisaPrcd);
  setVal('e-typeDemande',            d.typeDemande || 'TRANSFORMATION');

  // Type de visa en READ-ONLY avec label personnalisé
  const typeVisaInput = document.getElementById('e-typeVisa');
  if (typeVisaInput && d.typeVisa) {
    const display = visaDisplayLabels[d.typeVisa] || d.typeVisa;
    typeVisaInput.value = display;
  }
}

function buildPiecesGrid() {
  const grid = document.getElementById('pieces-grid');
  if (!piecesList.length) {
    grid.innerHTML = '<div class="text-sm text-muted">Aucune pièce à afficher pour ce dossier.</div>';
    updateProgress();
    return;
  }

  grid.innerHTML = piecesList.map(p => {
    const checked = p.isProvided === true;
    const label = p.libelle || 'Pièce';
    return `
      <div class="piece-item ${checked ? 'checked' : ''}" id="pi-${p.categoriePieceId}" onclick="togglePiece(${p.categoriePieceId})">
        <div class="piece-check">${checked ? '✓' : ''}</div>
        <div class="piece-label">${label}</div>
      </div>`;
  }).join('');
  updateProgress();
}

function togglePiece(categoriePieceId) {
  const piece = piecesList.find(p => p.categoriePieceId === categoriePieceId);
  if (!piece) return;
  piece.isProvided = !piece.isProvided;
  const el = document.getElementById('pi-' + categoriePieceId);
  el.classList.toggle('checked', piece.isProvided);
  el.querySelector('.piece-check').textContent = piece.isProvided ? '✓' : '';
  updateProgress();
}

function updateProgress() {
  const { done, total, pct } = countPieces({ pieces: piecesList });
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' pièce' + (done > 1 ? 's' : '') + ' fournie' + (done > 1 ? 's' : '');
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('pieces-count').textContent = done + ' / ' + total;

  const badge = statusLabel(pct === 100 ? 'COMPLET' : 'INCOMPLET');
  document.getElementById('status-badge-wrap').innerHTML =
    `<span class="badge ${badge.cls}" style="font-size:13px;padding:5px 14px">${badge.label}</span>`;
}

async function loadDemande() {
  await loadReferenceData();

  demandeId = getIdFromUrl();
  if (!demandeId) {
    document.getElementById('loading-state').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>
       <div class="empty-title">Aucun identifiant de demande</div>
       <div class="empty-sub"><a href="listing-demandes.html">Retour à la liste</a></div></div>`;
    return;
  }

  try {
    const d = await apiFetch(API.demandeById(demandeId));
    currentData = normalizeDemande(d);

    document.getElementById('page-title').innerHTML = `Dossier <em>#${demandeId}</em>`;
    document.getElementById('page-sub').textContent =
      `${currentData.lastName || ''} ${currentData.firstNames || ''} — ${currentData.typeVisa || currentData.typeDemande || ''}`;

    populateForm(currentData);
    await loadPieces();

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch (e) {
    document.getElementById('loading-state').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>
       <div class="empty-title">Erreur de chargement</div>
       <div class="empty-sub">${e.message}</div></div>`;
  }
}

async function savePieces() {
  const payload = piecesList.map(p => ({
    categoriePieceId: p.categoriePieceId,
    isProvided: p.isProvided === true,
  }));

  try {
    const updated = await apiFetch(API.demandePieces(demandeId), {
      method: 'PUT',
      body: payload,
    });
    piecesList = (updated || []).map(p => ({
      categoriePieceId: p.categoriePieceId || (p.categoriePiece ? p.categoriePiece.id : null),
      libelle: p.libelle || (p.categoriePiece ? p.categoriePiece.libelle : null),
      isProvided: p.isProvided === true || p.is_provided === true,
    }));
    buildPiecesGrid();
    showToast('Pièces enregistrées !');
  } catch (e) {
    showToast('Erreur : ' + e.message, 'danger');
  }
}

async function saveDemande() {
  const payload = buildDemandePayload({
    lastName: getVal('e-lastName'),
    firstNames: getVal('e-firstNames'),
    maidenName: getVal('e-maidenName'),
    birthDate: getVal('e-birthDate'),
    birthPlace: getVal('e-birthPlace'),
    maritalStatus: getVal('e-maritalStatus'),
    nationality: getVal('e-nationality'),
    homeAddress: getVal('e-homeAddress'),
    occupation: getVal('e-occupation'),
    employerName: getVal('e-employerName'),
    employerAddress: getVal('e-employerAddress'),
    numeroVisaPrcd: getVal('e-numeroVisaPrcd'),
    dateDelivranceVisaPrcd: getVal('e-dateDelivranceVisaPrcd'),
    dateExpirationVisaPrcd: getVal('e-dateExpirationVisaPrcd'),
    typeDemande: getVal('e-typeDemande'),
    // typeVisa n'est pas modifiable - ne pas l'envoyer
  });
  await save(payload, 'Modifications enregistrées !');
}

async function save(payload, msg) {
  const btn = document.getElementById('btn-save');
  if (btn) { btn.disabled = true; document.getElementById('save-text').textContent = 'Enregistrement…'; }
  try {
    const updated = await apiFetch(API.demandeById(demandeId), {
      method: 'PUT',
      body: payload,
    });
    currentData = { ...currentData, ...updated };
    updateProgress();
    showToast(msg);
  } catch (e) {
    showToast('Erreur : ' + e.message, 'danger');
  } finally {
    if (btn) { btn.disabled = false; document.getElementById('save-text').textContent = 'Enregistrer les modifications'; }
  }
}

loadDemande();
</script>
</body>
</html>
